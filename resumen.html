<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Control | Gestión de Finanzas Personales</title>
    <link rel="stylesheet" href="css/resumen.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.2/xlsx.full.min.js"></script>

</head>

<body>
    <header class="header" id="header">
        <h3 class="h1">Gestión de Finanzas Personales - Resumen Mensual</h3>


    </header>

    <div class="overlay">
        <div class="loader"></div>
    </div>

    <div id="mySidebar" class="sidebar">
        <div class="logoct">
            <img src="img/Logo-ct.svg" alt="CT Logo" >
        </div>
        <ul class="sidebar-list">
            <li><a href="index.html"><i class="fa fa-home"></i> Inicio</a></li>
            <li><a href="resumen.html"><i class="fas fa-chart-pie"></i> Resumen Mensual</a></li>
            <li><a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a></li>
            <li><a href="perfil.html"><i class="fas fa-user-alt"></i> Perfil</a></li>
            <li><a href="soporte.html"><i class="fas fa-question-circle"></i> Soporte</a></li>
            <li><a href="login.html"><i class="	fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>

        </ul>
    </div>


    <div class="content">
        <div class="container">
            <main class="left-section">
                <!-- Contenido para la parte izquierda de la pantalla -->
                <div class="content2">
                    <!-- Ejemplo de formulario de filtro -->
                    <form id="filter-form">
                        <label for="month">Selecciona un Mes:</label>
                        <select id="month" name="month">
                            <!-- Opciones de los meses -->
                            <option value="vacio"></option>
                            <option value="enero">Enero</option>
                            <option value="febrero">Febrero</option>
                            <option value="marzo">Marzo</option>
                            <option value="abril">Abril</option>
                            <option value="mayo">Mayo</option>
                            <option value="junio">Junio</option>
                            <option value="julio">Julio</option>
                            <option value="agosto">Agosto</option>
                            <option value="septiembre">Septiembre</option>
                            <option value="octubre">Octubre</option>
                            <option value="noviembre">Noviembre</option>
                            <option value="diciembre">Diciembre</option>
                        </select>

                        <label for="year">Selecciona un Año:</label>
                        <select id="year" name="year">
                            <!-- Opciones de los años -->
                            <option value="vacio"></option>
                            <option value="2023">2023</option>
                        </select>
                        <div class="botonesFiltro">
                            <div class="left-buttons">
                                <button type="submit" class="consultarBoton"
                                    title="Realizar búsqueda en base a filtro"><i class='fas fa-search'></i>
                                    Consultar</button>
                                <button id="export-button-excel" class="export-button" title="Exportar a Excel"><i
                                        class="fas fa-file-excel"></i></button>
                                <button id="export-button-pdf" class="export-button" title="Exportar a PDF"><i
                                        class="fas fa-file-pdf"></i></button>
                            </div>
                            <div class="right-buttons">
                                <button id="eye-button" class="eye-button" title="Visualizar elementos"><i
                                        class="fas fa-eye-slash"></i></button>
                            </div>
                        </div>



                    </form>

                    <!-- Resultados del filtro -->
                    <div id="filtered-results">
                        <!-- Aquí se mostrarán los resultados del filtro -->
                        <table>
                            <thead>
                                <tr>
                                    <th id="ingresosTotales">Ingresos Totales</th>
                                    <th id="gastosTotales">Gastos Totales</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td id="total-ingresos">0 €</td>
                                    <td id="total-gastos">0 €</td>
                                </tr>
                            </tbody>
                        </table>
                        <table>
                            <thead>
                                <tr>
                                    <th>Ahorro</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td id="ahorro">0 €</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
            <main class="right-section">
                <!-- Contenido para la parte derecha de la pantalla -->

                <canvas id="myChart" width="400" height="240"></canvas>
            </main>
        </div>
        <footer class="footer">
            <div class="footer-block author">
                <ul>
                    <li><span>© CashControl 2023 | Juan Carlos Valverde Vita</span></li>
                </ul>
            </div>
        </footer>

        <script src="js\resumen.js"></script>


</body>

</html>
