<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Cash Control - Iniciar Sesión</title>
</head>
<body>

    <div class="overlay">
        <div class="loader"></div>
    </div>
    
    <main class="left-section">
        <div class="logo">
            <!-- Aquí puedes agregar el logo de tu aplicación -->
            <img src="tu-logo.png" alt="Logo de tu aplicación">
        </div>
    </main>
    <main class="right-section">
        <div class="login-form">
            <h2>Iniciar Sesión</h2>
            <form>
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>

                <button class="login-button" type="submit" onclick="">Iniciar Sesión</button>
            </form>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
